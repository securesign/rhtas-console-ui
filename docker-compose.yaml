networks:
  console:

services:
  console-db:
    image: ${CONSOLE_DB_IMAGE}
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: tuf_trust
      MYSQL_USER: rootuser
      MYSQL_PASSWORD: root
    networks:
      - console
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpassword"]
      interval: 10s     # how often to check
      timeout: 5s       # max time to wait for one check
      retries: 5        # how many failures before unhealthy
      start_period: 15s # time to wait before starting checks

  console:
    image: ${CONSOLE_IMAGE}
    ports:
      - "8087:8080"
    environment:
      GODEBUG: fips140=off
    command:
      - "--mysql-uri=rootuser:root@tcp(console-db:3306)/tuf_trust"
      - "--tuf-repo-url=https://tuf-repo-cdn.sigstore.dev"
    networks:
      - console
    depends_on:
      console-db:
        condition: service_healthy
  
  console-ui:
    image: ${CONSOLE_UI_IMAGE}
    environment:
      CONSOLE_API_URL: http://console:8080
    ports:
      - "8088:8080"
    networks:
      - console
    depends_on:
      console:
        condition: service_started
  
  playwright:
    image: mcr.microsoft.com/playwright:v1.61.1-jammy
    ports:
      - "5000:5000"
    network_mode: host
    working_dir: /home/pwuser
    command:
      - /bin/sh
      - -c
      - npx -y playwright@1.61.1 run-server --port 5000

